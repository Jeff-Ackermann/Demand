<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demand Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Overlock:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="theme-chalkboard.css">
  <style>
    :root {
      --gold: #e4d26f;
      --chalk-white: #f4f6ee;
      --chalk-faint: rgba(244, 246, 238, 0.78);
      --board-shadow: rgba(0, 0, 0, 0.28);
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 0;
      display: grid;
      place-items: center;
      background: #ece7de;
      font-family: "Overlock", "Trebuchet MS", "Segoe UI", Arial, sans-serif;
    }

    body::before,
    body::after {
      display: none;
    }

    .page-shell {
      width: min(100vw, calc(100vh * 1.515));
      height: min(100vh, calc(100vw / 1.515));
      margin: 0;
      padding: 5.1% 5.2% 8.2%;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
      background:
        linear-gradient(rgba(21, 67, 46, 0.36), rgba(12, 39, 28, 0.42)),
        url("Chalkboard.png") center / cover no-repeat;
      box-sizing: border-box;
      overflow: hidden;
      position: relative;
    }

    .hero {
      display: block;
      padding: 0;
      border: none;
      border-radius: 0;
      box-shadow: none;
      background: transparent;
      text-align: center;
    }

    .eyebrow,
    .hero-text,
    .hero-stats {
      display: none;
    }

    h1 {
      margin: 0;
      color: var(--gold);
      font-family: "Architects Daughter", "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      font-size: clamp(2.5rem, 4.2vw, 4rem);
      font-weight: 400;
      letter-spacing: 0.06em;
      font-variant: small-caps;
      text-transform: none;
    }

    .layout {
      display: grid;
      grid-template-columns: 16% 1fr;
      gap: 3%;
      margin: 0;
      align-items: start;
      min-height: 0;
    }

    .sidebar {
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 26px;
      position: relative;
      z-index: 5;
    }

    .panel {
      padding: 0;
      background: transparent;
      border: none;
      box-shadow: none;
      border-radius: 0;
    }

    .panel h2 {
      margin: 0 0 10px;
      color: var(--gold);
      font-family: "Overlock", "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      font-variant: normal;
    }

    .mode-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin: 0;
    }

    .mode-button {
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      text-align: left;
      color: var(--gold);
      font-family: "Overlock", "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.45;
      transform: none;
    }

    .mode-button:hover,
    .mode-button.active {
      color: var(--chalk-white);
      background: transparent;
      box-shadow: none;
      transform: none;
    }

    .sidebar-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 6px;
    }

    .next-button {
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      color: var(--gold);
      text-align: left;
      font-family: "Overlock", "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.45;
      transform: none;
    }

    .next-button:hover {
      color: var(--chalk-white);
      background: transparent;
      box-shadow: none;
      transform: none;
    }

    .workspace {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
      min-height: 0;
      padding-top: 1%;
      position: relative;
      z-index: 1;
    }

    .workspace-top {
      display: none;
    }

    .question-card {
      min-height: 0;
      padding: 0;
      border: none;
      border-radius: 0;
      box-shadow: none;
      background: transparent;
    }

    #questionTitle {
      display: none;
      margin: 0;
      color: var(--chalk-white);
      font-family: "Overlock", "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      font-size: clamp(1.65rem, 3.2vw, 2.5rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      font-variant: normal;
      text-transform: none;
    }

    .question-prompt,
    .feedback-text,
    .small-note,
    .focus-list {
      color: var(--chalk-faint);
      font-family: "Overlock", "Trebuchet MS", "Segoe UI", Arial, sans-serif;
    }

    .question-prompt {
      margin: 0 0 10px;
      color: var(--chalk-white);
      font-size: 1.12rem;
      line-height: 1.4;
      font-weight: 700;
    }

    .question-body {
      margin-top: 0;
    }

    .feedback-card {
      padding: 0;
      background: transparent;
      border: none;
      box-shadow: none;
      border-radius: 0;
    }

    .feedback-status {
      margin: 0 0 6px;
      color: var(--gold);
      font-family: "Overlock", "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .choice-grid {
      gap: 14px;
    }

    .choice-button,
    .action-button,
    .inline-input,
    .inline-select,
    .marker-pill,
    .legend-chip {
      background: rgba(255, 255, 255, 0.06);
      color: var(--chalk-white);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: none;
      border-radius: 999px;
      font-family: "Overlock", "Trebuchet MS", "Segoe UI", Arial, sans-serif;
    }

    .inline-select {
      color: var(--chalk-white);
      background: rgba(0, 0, 0, 0.18);
    }

    .inline-select option {
      color: #173726;
      background: #f4f6ee;
    }

    .choice-button {
      padding: 14px 18px;
      text-align: left;
      font-size: 1rem;
      line-height: 1.45;
    }

    .choice-button:hover,
    .action-button:hover {
      transform: none;
      background: rgba(255, 255, 255, 0.1);
    }

    .choice-button.correct {
      background: rgba(124, 206, 141, 0.2);
      border-color: rgba(169, 234, 180, 0.7);
    }

    .choice-button.incorrect {
      background: rgba(219, 146, 126, 0.18);
      border-color: rgba(255, 200, 184, 0.6);
    }

    .action-button {
      color: var(--gold);
      font-weight: 700;
    }

    .table-caption,
    .drag-note,
    .graph-legend {
      color: var(--chalk-faint);
    }

    table {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      overflow: hidden;
      font-size: 0.96rem;
    }

    th {
      background: rgba(255, 255, 255, 0.08);
      color: var(--chalk-white);
    }

    th,
    td {
      color: var(--chalk-white);
    }

    .graph-frame {
      background: transparent;
      border-radius: 8px;
      border: none;
      box-shadow: none;
    }

    .table-shell,
    .graph-shell {
      margin-top: 0;
    }

    .graph-shell {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .graph-shell .drag-note {
      order: 0;
      margin: 0 0 2px;
      font-size: 0.98rem;
      line-height: 1.35;
    }

    .graph-shell .graph-legend {
      order: 1;
      margin: 0 0 2px;
      gap: 8px;
    }

    .graph-shell .graph-frame {
      order: 2;
      padding: 0;
      overflow: visible;
      width: 100%;
      margin-left: 0;
    }

    .graph-shell .graph-answer,
    .graph-shell .answer-row,
    .graph-shell .choice-grid {
      order: 3;
    }

    .graph-frame svg {
      width: 100%;
      max-height: min(44vh, 360px);
      display: block;
      transform: none;
    }

    .graph-frame svg rect:first-child {
      fill: transparent !important;
    }

    .graph-frame svg line[stroke*="rgba"] {
      stroke: rgba(255, 255, 255, 0.12) !important;
    }

    .graph-frame svg text {
      fill: var(--chalk-white) !important;
    }

    .legend-chip {
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--chalk-white);
      padding: 6px 10px;
    }

    .table-shell table tbody tr:nth-child(n + 5) {
      display: none;
    }

    th,
    td {
      padding: 10px 12px;
      color: var(--chalk-white);
    }

    .answer-row {
      margin-top: 10px;
    }

    .stat-card {
      display: none;
    }

    .hidden-mode,
    .hidden-panel {
      display: none !important;
    }

    .sidebar-input {
      width: 100%;
      margin: 0 0 10px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.18);
      color: var(--chalk-white);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      font-size: 0.98rem;
      box-sizing: border-box;
    }

    .sidebar-input::placeholder {
      color: rgba(244, 246, 238, 0.55);
    }

    .challenge-list {
      margin-top: 6px;
    }

    .challenge-status {
      margin: 10px 0 0;
      color: var(--chalk-faint);
      font-size: 0.92rem;
      line-height: 1.35;
      min-height: 2.6em;
    }

    .challenge-banner {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin: 0 0 12px;
      color: var(--gold);
      font-size: 0.98rem;
      font-weight: 700;
    }

    .challenge-banner-lead {
      flex-basis: 100%;
      color: var(--chalk-white);
      font-size: 1.02rem;
      line-height: 1.3;
    }

    .challenge-banner.hidden {
      display: none;
    }

    .leaderboard-card,
    .finish-card {
      padding: 10px 0 0;
      color: var(--chalk-white);
    }

    .leaderboard-card h3,
    .finish-card h3 {
      margin: 0 0 12px;
      color: var(--gold);
      font-size: 1.3rem;
      font-weight: 700;
    }

    .leaderboard-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 52px 1fr 110px;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
    }

    .leaderboard-rank,
    .leaderboard-time {
      color: var(--gold);
      font-weight: 700;
    }

    .leaderboard-empty,
    .server-note {
      color: var(--chalk-faint);
      line-height: 1.45;
    }

    body,
    .panel h2,
    .mode-button,
    .next-button,
    #questionTitle,
    .question-prompt,
    .feedback-text,
    .feedback-status,
    .choice-button,
    .action-button,
    .inline-input,
    .inline-select,
    .marker-pill,
    .legend-chip,
    th,
    td,
    .graph-frame svg text {
      font-family: "Overlock", "Trebuchet MS", Arial, sans-serif !important;
    }

    h1 {
      font-family: "Architects Daughter", "Trebuchet MS", Arial, sans-serif !important;
    }

    table {
      font-size: 1.12rem;
    }

    th,
    td {
      font-size: 1.08rem;
    }

    .graph-frame svg text {
      font-size: 17px !important;
    }

    .graph-frame svg text.axis-label {
      font-size: 20px !important;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      body {
        display: block;
      }

      .page-shell {
        width: 100vw;
        min-height: 100vh;
        height: auto;
        padding: 28px 26px 42px;
        background-position: center;
        overflow: visible;
      }

      .layout {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .sidebar {
        gap: 16px;
      }

      .graph-shell .graph-frame {
        width: 100%;
        margin-left: 0;
        overflow-x: auto;
      }

      .graph-frame svg {
        max-height: none;
      }

      .question-card {
        min-height: 360px;
        padding: 0;
      }
    }

    @media (min-width: 901px) {
      .question-prompt {
        line-height: 1.34;
      }

      .graph-shell .graph-frame {
        width: 94%;
        margin: 0 auto;
      }

      .graph-frame svg {
        max-height: min(33vh, 288px);
      }

      .graph-shell .choice-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px 14px;
      }

      .choice-button {
        padding: 12px 15px;
        font-size: 0.97rem;
        line-height: 1.3;
      }
    }

    @media (min-width: 901px) and (max-width: 1100px) {
      .page-shell {
        padding: 4.5% 4.8% 13.8%;
        gap: 10px;
      }

      h1 {
        font-size: clamp(2.1rem, 3.7vw, 3.2rem);
      }

      .layout {
        grid-template-columns: 14% 1fr;
        gap: 2.1%;
      }

      .sidebar {
        gap: 16px;
        padding-top: 2px;
      }

      .panel h2,
      .mode-button,
      .next-button {
        font-size: 0.96rem;
        line-height: 1.28;
      }

      .workspace {
        gap: 4px;
        padding-top: 0;
      }

      .question-prompt {
        margin: 0 0 5px;
        font-size: 1rem;
        line-height: 1.28;
      }

      .graph-shell {
        gap: 5px;
      }

      .graph-shell .drag-note {
        font-size: 0.88rem;
        line-height: 1.2;
      }

      .graph-shell .graph-frame {
        width: 88%;
      }

      .graph-frame svg {
        max-height: min(24vh, 214px);
      }

      .graph-shell .choice-grid {
        gap: 9px 10px;
      }

      .choice-button {
        padding: 10px 12px;
        font-size: 0.9rem;
        line-height: 1.22;
      }
    }

    @media (min-width: 901px) and (max-height: 820px) {
      .page-shell {
        padding: 4.2% 4.5% 6.4%;
        gap: 12px;
      }

      h1 {
        font-size: clamp(2.2rem, 3.8vw, 3.4rem);
      }

      .layout {
        grid-template-columns: 14% 1fr;
        gap: 2.4%;
      }

      .sidebar {
        gap: 18px;
        padding-top: 4px;
      }

      .panel h2,
      .mode-button,
      .next-button {
        font-size: 0.98rem;
        line-height: 1.3;
      }

      .workspace {
        gap: 4px;
        padding-top: 0;
      }

      .question-prompt {
        margin: 0 0 6px;
        font-size: 1rem;
        line-height: 1.28;
      }

      .graph-shell {
        gap: 6px;
      }

      .graph-shell .drag-note {
        font-size: 0.9rem;
        line-height: 1.25;
      }

      .graph-shell .graph-frame {
        width: 92%;
        margin: 0 auto;
      }

      .graph-frame svg {
        max-height: min(27vh, 228px);
      }

      .graph-shell .choice-grid {
        gap: 10px 12px;
      }

      .choice-button {
        padding: 11px 14px;
        font-size: 0.95rem;
        line-height: 1.28;
      }

      .feedback-status {
        margin: 0 0 4px;
        font-size: 0.98rem;
      }

      .feedback-text {
        font-size: 0.92rem;
        line-height: 1.3;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <h1>Demand</h1>
      <div class="hero-stats">
        <div class="stat-card"><span class="stat-label">Answered</span><strong id="answeredCount">0</strong></div>
        <div class="stat-card"><span class="stat-label">Correct</span><strong id="correctCount">0</strong></div>
        <div class="stat-card"><span class="stat-label">Accuracy</span><strong id="accuracyRate">0%</strong></div>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <section class="panel">
          <div class="mode-list">
            <button id="practiceModeButton" class="mode-button active" type="button">Practice Mode</button>
            <button id="speedChallengeButton" class="mode-button" type="button" data-challenge-mode="graph">Speed Challenge</button>
            <button id="leaderboardButton" class="mode-button" type="button" data-leaderboard-mode="graph">View Leaderboard</button>
            <button id="nextButton" class="next-button" type="button">New Question</button>
          </div>
          <input id="playerNameInput" class="sidebar-input hidden" type="text" maxlength="24" placeholder="Enter your name for the speed challenge">
          <p id="challengeStatus" class="challenge-status">Practice mode is ready.</p>
        </section>
      </aside>

      <section class="workspace">
        <div class="question-card">
          <h2 id="questionTitle">Insert demand schedule or graph</h2>
          <div id="challengeBanner" class="challenge-banner hidden"></div>
          <div id="questionPrompt" class="question-prompt"></div>
          <div id="questionBody" class="question-body"></div>
        </div>

        <div id="feedbackCard" class="feedback-card hidden">
          <p id="feedbackStatus" class="feedback-status"></p>
          <p id="feedbackText" class="feedback-text"></p>
        </div>
      </section>
    </main>
  </div>

  <script>
    window.CHALLENGE_CONFIG = {
      endpoint: "https://script.google.com/macros/s/AKfycbwGntwK9qZYn_KRB-27uXaBrVxZuItnAJODzC2-hUaByf6SD4v9XMkDdkocuMf7PnGa/exec"
    };
  </script>
  <script src="app.js"></script>
  <script>
    function restyleGraphAxisLabels() {
      const svgs = document.querySelectorAll(".graph-frame svg");
      svgs.forEach((svg) => {
        const labels = svg.querySelectorAll("text");
        labels.forEach((label) => {
          const text = (label.textContent || "").trim();
          if (text === "Quantity" || text === "Price") {
            label.classList.add("axis-label");
          }
        });
      });
    }

    window.addEventListener("load", () => {
      const graphButton = document.querySelector('.mode-button[data-mode="graph"]');
      if (graphButton) {
        graphButton.click();
      }
      restyleGraphAxisLabels();

      const observer = new MutationObserver(() => {
        restyleGraphAxisLabels();
      });
      observer.observe(document.getElementById("questionBody"), { childList: true, subtree: true });
    });
  </script>
</body>
</html>
