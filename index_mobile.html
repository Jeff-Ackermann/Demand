<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Demand Lab Mobile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Overlock:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0d241b;
      --bg-mid: #16392b;
      --bg-soft: #1d4735;
      --panel: rgba(19, 53, 38, 0.82);
      --panel-border: rgba(244, 246, 238, 0.08);
      --chalk-white: #f4f6ee;
      --chalk-soft: rgba(244, 246, 238, 0.78);
      --chalk-faint: rgba(244, 246, 238, 0.62);
      --gold: #e4d26f;
      --green: rgba(124, 206, 141, 0.22);
      --green-border: rgba(169, 234, 180, 0.58);
      --red: rgba(219, 146, 126, 0.18);
      --red-border: rgba(255, 200, 184, 0.52);
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100dvh;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.05), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.04), transparent 24%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg-mid) 42%, var(--bg-deep) 100%);
      color: var(--chalk-white);
      font-family: "Overlock", "Trebuchet MS", Arial, sans-serif;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .page-shell {
      width: min(100%, 480px);
      margin: 0 auto;
      padding: max(16px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom)) 16px;
    }

    .main-menu-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 20px 16px;
      background: rgba(6, 18, 13, 0.68);
      backdrop-filter: blur(8px);
    }

    .main-menu-card {
      width: min(100%, 420px);
      padding: 22px 18px 18px;
      border-radius: 24px;
      background: rgba(18, 49, 36, 0.95);
      border: 1px solid rgba(244, 246, 238, 0.12);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .main-menu-card h2 {
      margin: 0;
      color: var(--gold);
      font-family: "Architects Daughter", "Trebuchet MS", Arial, sans-serif;
      font-size: 2rem;
      font-weight: 400;
      font-variant: small-caps;
      text-transform: none;
    }

    .main-menu-actions {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    body.play-active .page-shell {
      padding-top: max(8px, env(safe-area-inset-top));
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    .hero,
    .panel,
    .question-card,
    .feedback-card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }

    .hero {
      padding: 18px 18px 14px;
      border-radius: 24px;
      margin-bottom: 14px;
      text-align: center;
    }

    body.play-active .hero {
      padding: 8px 12px;
      margin-bottom: 8px;
      border-radius: 16px;
    }

    h1 {
      margin: 0;
      color: var(--gold);
      font-family: "Architects Daughter", "Trebuchet MS", Arial, sans-serif;
      font-size: clamp(2rem, 8vw, 2.8rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      font-variant: small-caps;
      text-transform: none;
    }

    .hero-text {
      margin: 6px 0 0;
      color: var(--chalk-soft);
      font-size: 0.98rem;
      line-height: 1.35;
    }

    body.play-active .hero-text {
      display: none;
    }

    .hero-stats,
    .challenge-topbar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    body.play-active .hero-stats,
    body.play-active .challenge-topbar {
      gap: 5px;
      margin-top: 0;
    }

    .stat-card {
      padding: 10px 8px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    body.play-active .stat-card {
      padding: 5px 4px;
      border-radius: 10px;
    }

    .stat-label {
      display: block;
      margin-bottom: 4px;
      color: var(--chalk-faint);
      font-size: 0.78rem;
    }

    body.play-active .stat-label {
      margin-bottom: 1px;
      font-size: 0.66rem;
    }

    .stat-card strong {
      color: var(--chalk-white);
      font-size: 1.05rem;
    }

    body.play-active .stat-card strong {
      font-size: 0.86rem;
    }

    .layout {
      display: grid;
      gap: 14px;
    }

    body.play-active .layout {
      gap: 10px;
    }

    .sidebar,
    .workspace {
      display: grid;
      gap: 14px;
    }

    .panel,
    .question-card,
    .feedback-card {
      border-radius: 22px;
    }

    .panel {
      padding: 16px;
    }

    .control-panel {
      padding: 10px;
      border-radius: 16px;
    }

    body.play-active .sidebar {
      order: 2;
      gap: 8px;
    }

    body.play-active .workspace {
      order: 1;
      gap: 10px;
    }

    body.play-active .panel {
      padding: 10px;
      border-radius: 16px;
    }

    body.play-active .panel h2,
    body.play-active .challenge-status {
      display: none;
    }

    .panel h2 {
      margin: 0 0 10px;
      color: var(--gold);
      font-size: 1.1rem;
      font-weight: 700;
    }

    .mode-list,
    .sidebar-actions {
      display: grid;
      gap: 10px;
    }

    body.play-active .mode-list {
      gap: 8px;
    }

    .mode-button,
    .next-button,
    .choice-button,
    .action-button {
      width: 100%;
      border: 1px solid rgba(244, 246, 238, 0.12);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--chalk-white);
      cursor: pointer;
      text-align: left;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .mode-button,
    .next-button,
    .action-button {
      padding: 12px 14px;
      font-weight: 700;
    }

    body.play-active .mode-button,
    body.play-active .next-button,
    body.play-active .action-button {
      padding: 9px 10px;
      border-radius: 12px;
      font-size: 0.85rem;
    }

    body.play-active .mode-list {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    body.play-active #practiceModeButton,
    body.play-active #speedChallengeButton,
    body.play-active #leaderboardButton,
    body.play-active #nextButton {
      text-align: center;
    }

    .mode-button.active,
    .action-button {
      color: #113121;
      background: linear-gradient(135deg, #ecdf88, #b4df8c);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .next-button {
      color: var(--chalk-white);
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(244, 246, 238, 0.12);
    }

    .mode-button:hover,
    .next-button:hover,
    .choice-button:hover,
    .action-button:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .sidebar-input,
    .inline-input,
    .inline-select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(244, 246, 238, 0.12);
      background: rgba(0, 0, 0, 0.16);
      color: var(--chalk-white);
    }

    .sidebar-input::placeholder,
    .inline-input::placeholder {
      color: rgba(244, 246, 238, 0.48);
    }

    .sidebar-input.hidden {
      display: none;
    }

    .challenge-status,
    .feedback-text,
    .leaderboard-empty,
    .server-note,
    .table-caption {
      margin: 0;
      color: var(--chalk-faint);
      line-height: 1.4;
    }

    .challenge-status:empty {
      display: none;
    }

    .question-card {
      padding: 16px;
    }

    body.play-active .question-card {
      padding: 10px;
      border-radius: 16px;
    }

    #questionTitle {
      display: none;
    }

    .challenge-banner {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      margin: 0 0 10px;
      color: var(--gold);
      font-size: 0.94rem;
      font-weight: 700;
    }

    body.play-active .challenge-banner {
      gap: 4px 10px;
      margin-bottom: 6px;
      font-size: 0.82rem;
    }

    .challenge-banner.hidden,
    .hidden,
    .hidden-mode,
    .hidden-panel {
      display: none !important;
    }

    .question-prompt {
      margin: 0 0 10px;
      color: var(--chalk-white);
      font-size: 1.08rem;
      line-height: 1.34;
      font-weight: 700;
    }

    body.play-active .question-prompt {
      margin-bottom: 6px;
      font-size: 0.92rem;
      line-height: 1.16;
    }

    .question-body {
      margin-top: 0;
    }

    .graph-shell {
      display: grid;
      gap: 10px;
    }

    body.play-active .graph-shell {
      gap: 6px;
    }

    .graph-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--chalk-faint);
      font-size: 0.9rem;
    }

    .legend-chip,
    .marker-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.06);
      color: var(--chalk-white);
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
    }

    .graph-frame {
      padding: 10px;
      border-radius: 18px;
      background: rgba(8, 24, 18, 0.26);
      border: 1px solid rgba(244, 246, 238, 0.08);
      overflow: hidden;
    }

    body.play-active .graph-frame {
      padding: 6px;
      border-radius: 14px;
    }

    .graph-frame svg {
      width: 100%;
      max-height: 250px;
      display: block;
    }

    body.play-active .graph-frame svg {
      max-height: min(20dvh, 152px);
    }

    .graph-frame svg text {
      fill: var(--chalk-white) !important;
      font-family: "Overlock", "Trebuchet MS", Arial, sans-serif !important;
    }

    .graph-frame svg rect:first-child {
      fill: transparent !important;
    }

    .graph-frame svg line[stroke*="rgba"] {
      stroke: rgba(255, 255, 255, 0.12) !important;
    }

    .choice-grid {
      display: grid;
      gap: 10px;
    }

    body.play-active .choice-grid {
      gap: 6px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .choice-button {
      padding: 12px 14px;
      font-size: 0.98rem;
      line-height: 1.28;
    }

    body.play-active .choice-button {
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      line-height: 1.08;
      min-height: 56px;
    }

    .choice-button.correct {
      background: var(--green);
      border-color: var(--green-border);
    }

    .choice-button.incorrect {
      background: var(--red);
      border-color: var(--red-border);
    }

    .answer-row,
    .graph-answer {
      display: grid;
      gap: 10px;
    }

    body.play-active .answer-row,
    body.play-active .graph-answer {
      gap: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
    }

    th,
    td {
      padding: 10px;
      border-bottom: 1px solid rgba(244, 246, 238, 0.08);
      text-align: center;
      color: var(--chalk-white);
    }

    th {
      background: rgba(255, 255, 255, 0.08);
      font-weight: 700;
    }

    .feedback-card {
      padding: 14px 16px;
    }

    body.play-active .feedback-card {
      padding: 10px 12px;
      border-radius: 14px;
    }

    .feedback-status {
      margin: 0 0 6px;
      color: var(--gold);
      font-size: 1rem;
      font-weight: 700;
    }

    .feedback-card.correct {
      background: rgba(124, 206, 141, 0.12);
      border-color: rgba(169, 234, 180, 0.34);
    }

    .feedback-card.incorrect {
      background: rgba(219, 146, 126, 0.12);
      border-color: rgba(255, 200, 184, 0.28);
    }

    .leaderboard-card,
    .finish-card {
      color: var(--chalk-white);
    }

    .leaderboard-card h3,
    .finish-card h3 {
      margin: 0 0 10px;
      color: var(--gold);
      font-size: 1.2rem;
    }

    .leaderboard-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 40px 1fr 70px;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .leaderboard-rank,
    .leaderboard-time {
      color: var(--gold);
      font-weight: 700;
    }

    .leaderboard-date {
      margin-top: 2px;
      color: var(--chalk-faint);
      font-size: 0.8rem;
    }

    .focus-list {
      margin: 0;
      padding-left: 18px;
      color: var(--chalk-faint);
      line-height: 1.45;
    }

    @media (min-width: 430px) {
      .choice-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-height: 760px) {
      body.play-active .hero {
        padding: 6px 10px;
      }

      body.play-active h1 {
        font-size: clamp(1.45rem, 6.5vw, 1.9rem);
      }

      body.play-active .question-prompt {
        font-size: 0.88rem;
        line-height: 1.12;
      }

      body.play-active .graph-frame svg {
        max-height: min(18dvh, 138px);
      }

      body.play-active .choice-button {
        padding: 7px 9px;
        font-size: 0.76rem;
        min-height: 50px;
      }
    }

    body.menu-open .page-shell {
      filter: blur(3px);
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body data-app="mobile">
  <div id="mainMenuOverlay" class="main-menu-overlay">
    <div class="main-menu-card">
      <h2>Demand</h2>
      <input id="playerNameInput" class="sidebar-input hidden" type="text" maxlength="24" placeholder="Enter your name for the speed challenge">
      <p id="challengeStatus" class="challenge-status"></p>
      <div class="main-menu-actions">
        <button id="mainMenuPracticeButton" class="action-button" type="button">Practice</button>
        <button id="mainMenuChallengeButton" class="action-button" type="button">Speed Challenge</button>
        <button id="mainMenuLeaderboardButton" class="action-button" type="button">View Leaderboard</button>
      </div>
    </div>
  </div>
  <div class="page-shell">
    <header class="hero">
      <h1>Demand</h1>
      <p class="hero-text">Phone-friendly graph practice for shifts, movement, and demand shifters.</p>
      <div id="challengeTopbar" class="challenge-topbar hidden">
        <div class="stat-card"><span class="stat-label">Answered</span><strong id="challengeAnswered">0</strong></div>
        <div class="stat-card"><span class="stat-label">Correct</span><strong id="challengeCorrect">0</strong></div>
        <div class="stat-card"><span class="stat-label">Time</span><strong id="challengeTimer">0:00</strong></div>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <section id="practiceControls" class="panel control-panel hidden">
          <div class="mode-list">
            <button id="nextButton" class="next-button" type="button">New Question</button>
            <button id="exitPracticeButton" class="mode-button" type="button">Exit Practice</button>
          </div>
        </section>
        <section id="challengeControls" class="panel control-panel hidden">
          <div class="mode-list">
            <button id="quitChallengeButton" class="mode-button" type="button">Quit Challenge</button>
          </div>
        </section>
        <section id="leaderboardControls" class="panel control-panel hidden">
          <div class="mode-list">
            <button id="mainMenuButton" class="mode-button" type="button">Main Menu</button>
          </div>
        </section>
      </aside>

      <section class="workspace">
        <div class="question-card">
          <h2 id="questionTitle">Demand Graphs</h2>
          <div id="challengeBanner" class="challenge-banner hidden"></div>
          <div id="questionPrompt" class="question-prompt"></div>
          <div id="questionBody" class="question-body"></div>
        </div>

        <div id="feedbackCard" class="feedback-card hidden">
          <p id="feedbackStatus" class="feedback-status"></p>
          <p id="feedbackText" class="feedback-text"></p>
        </div>
      </section>
    </main>
  </div>

  <button id="practiceModeButton" class="mode-button hidden" type="button">Practice Mode</button>
  <button id="speedChallengeButton" class="mode-button hidden" type="button" data-challenge-mode="graph">Speed Challenge</button>
  <button id="leaderboardButton" class="mode-button hidden" type="button" data-leaderboard-mode="graph">View Leaderboard</button>
  <strong id="answeredCount" class="hidden">0</strong>
  <strong id="correctCount" class="hidden">0</strong>
  <strong id="accuracyRate" class="hidden">0%</strong>

  <script>
    window.CHALLENGE_CONFIG = {
      endpoint: "https://script.google.com/macros/s/AKfycbwGntwK9qZYn_KRB-27uXaBrVxZuItnAJODzC2-hUaByf6SD4v9XMkDdkocuMf7PnGa/exec"
    };
  </script>
  <script src="app.js"></script>
  <script>
    function isPlayScreenActive() {
      const hasGraph = Boolean(document.querySelector(".graph-shell"));
      const showingLeaderboard = Boolean(document.querySelector(".leaderboard-card, .finish-card"));
      return hasGraph && !showingLeaderboard;
    }

    function syncMobilePlayState() {
      document.body.classList.toggle("play-active", isPlayScreenActive());
    }

    function restyleMobileGraph() {
      const svgs = document.querySelectorAll(".graph-frame svg");
      svgs.forEach((svg) => {
        svg.querySelectorAll("line").forEach((line) => {
          const stroke = line.getAttribute("stroke") || "";
          const dash = line.getAttribute("stroke-dasharray") || "";
          const strokeWidth = Number(line.getAttribute("stroke-width") || "1");
          if (stroke === "#1d1a16") {
            line.setAttribute("stroke", "#f8fbf3");
            line.setAttribute("stroke-width", String(Math.max(strokeWidth, 4.6)));
          } else if (stroke.includes("rgba(29,26,22")) {
            line.setAttribute("stroke", "rgba(244, 246, 238, 0.12)");
          } else if (dash) {
            line.setAttribute("stroke-width", String(Math.max(strokeWidth, 3.2)));
          }
        });

        svg.querySelectorAll("circle").forEach((circle) => {
          const fill = circle.getAttribute("fill") || "";
          const stroke = circle.getAttribute("stroke") || "";
          if (fill === "#78a9ff") {
            circle.setAttribute("fill", "#8eb8ff");
          }
          if (stroke === "#1d1a16") {
            circle.setAttribute("stroke", "rgba(244, 246, 238, 0.78)");
          }
        });

        svg.querySelectorAll("path").forEach((path) => {
          const stroke = path.getAttribute("stroke") || "";
          if (stroke === "#f4f6ee" || stroke === "white" || stroke === "#ffffff") {
            path.setAttribute("stroke", "#f8fbf3");
            path.setAttribute("stroke-width", "5");
          }
        });

        svg.querySelectorAll("text").forEach((label) => {
          const text = (label.textContent || "").trim();
          label.setAttribute("fill", "#f4f6ee");
          if (["P", "Price"].includes(text)) {
            label.style.fontSize = "40px";
            label.style.fontWeight = "900";
            label.setAttribute("x", "52");
            label.setAttribute("y", "74");
          } else if (["Q", "Quantity"].includes(text)) {
            label.style.fontSize = "40px";
            label.style.fontWeight = "900";
            label.setAttribute("y", "396");
          } else if (text === "A") {
            label.style.fontSize = "42px";
            label.style.fontWeight = "900";
            label.setAttribute("x", "456");
            label.setAttribute("y", "282");
          } else if (text === "B") {
            label.style.fontSize = "42px";
            label.style.fontWeight = "900";
            label.setAttribute("x", "592");
            label.setAttribute("y", "214");
          } else if (["A", "B", "x", "y"].includes(text)) {
            label.style.fontSize = "42px";
            label.style.fontWeight = text === "x" || text === "y" ? "800" : "900";
          } else if (/^\\d+$/.test(text)) {
            label.style.fontSize = "24px";
            label.style.fontWeight = "700";
          }
        });
      });
    }

    function syncMobileLayout() {
      syncMobilePlayState();
      restyleMobileGraph();
    }

    window.addEventListener("load", () => {
      syncMobileLayout();
      const observer = new MutationObserver(() => {
        window.requestAnimationFrame(syncMobileLayout);
      });
      const questionBody = document.getElementById("questionBody");
      const challengeBanner = document.getElementById("challengeBanner");
      if (questionBody) {
        observer.observe(questionBody, { childList: true, subtree: true });
      }
      if (challengeBanner) {
        observer.observe(challengeBanner, { childList: true });
      }
    });
  </script>
</body>
</html>
